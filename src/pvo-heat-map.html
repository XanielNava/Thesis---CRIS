<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIS - Interactive Heatmap</title>
    <link rel="stylesheet" href="../assets/css/pvo-heat-map.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="../assets/images/cris-icon.jpg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-section">
                <img src="../assets/images/logo-login.png" alt="CRIS Logo" class="logo-image">
                <p>Community-Centric<br>Rabies Intelligence System</p>
                <div class="role-badge">PVO MODULE</div>
            </div>

            <nav class="menu">
                <button class="menu-item" onclick="window.location.href='pvo-dashboard.html'">Dashboard</button>
                <button class="menu-item" onclick="window.location.href='pvo-animal-bite-cases.html'">Animal Bite Cases</button>
                <button class="menu-item active">Heatmap</button>
                <button class="menu-item">Statistics</button>
                <button class="menu-item">Messages</button>
                <button class="menu-item">Inventory</button>
                <button class="menu-item">Reports</button>
            </nav>
            <div class="footer-nav">
                <button class="menu-item alt">Settings</button>
                <button id="logout-btn" class="menu-item alt" onclick="window.location.href='pvo-login.html'">Logout</button>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-wrapper">
            
            <!-- Centered Map Container -->
            <div class="map-canvas">
                <img src="../assets/images/iloilo_province_map.qgz.png" alt="Iloilo Map" class="centered-map-img">
            </div>

            <!-- Heatmap Overlay is currently disabled/commented as per your previous design -->
        </main>
    </div>
</body>
</html>
