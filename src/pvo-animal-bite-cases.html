<!-- Add New Case Modal -->
<div id="caseModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Add New Rabies Case</h3>
      <span class="close-modal" onclick="closeCaseModal()">&times;</span>
    </div>
    
    <form id="caseForm">
   <form id="caseForm">
    <input type="text" id="caseId" placeholder="Case ID" required>
    <input type="text" id="municipality" placeholder="Municipality" required>
    <input type="text" id="barangay" placeholder="Barangay" required>
    <input type="text" id="animalType" placeholder="Animal Type (Dog/Cat/Other)" required>
    
    <select id="vaccinationStatus" required>
        <option value="">Vaccination Status</option>
        <option value="Vaccinated">Vaccinated</option>
        <option value="Not Vaccinated">Not Vaccinated</option>
        <option value="Unknown">Unknown</option>
    </select>
    
    <select id="clinicalLabResults" required>
        <option value="">Clinical Lab Results</option>
        <option value="Positive">Positive</option>
        <option value="Negative">Negative</option>
    </select>
    
    <input type="text" id="victimName" placeholder="Name of Victim" required>
    <input type="number" id="victimAge" placeholder="Age" min="0" max="120" required>

    <div class="modal-buttons">
        <button type="button" onclick="closeCaseModal()">Cancel</button>
        <button type="submit" id="submitCaseBtn">Add Case</button>
      </div>
    </form>
  </div>
</div>
    
</form>

      
      

<!-- Button to open modal (add to your page) -->
<button onclick="openCaseModal()" id="add-btn">+ New Case</button>
