    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <img src="../assets/images/logo-login.png" alt="CRIS logo" class="logo">
            <h1>Personnel Registration</h1>
            <button class="burger" onclick="openMenu()">☰ Menu</button>
        </div>
    </header>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <button class="close-btn" onclick="closeMenu()">✕</button>
        <nav>
            <a href="../index.html">Home</a>
            <a href="../src/pvo-login.html">Admin Access Portal</a>

        </nav>
    </aside> 

    <!-- Main Content -->
    <main class="main">
        <h2>Personnel Registration</h2>

        <div class="login-box">
            <a href="../index.html" class="logo-link">
                <img src="../assets/images/pvo-logo.png" alt="PVO logo" class="login-logo">
            </a>
             <div class="container">
            <form id="regForm">
                <input type="text" id="lastName" placeholder="Last Name" required>
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="middleInitial" placeholder="M.I." required>
                <input type="text" id="suffix" placeholder="Suffix /Jr./Sr./III">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <input type="text" id="address" placeholder="Address">
                <input type="text" id="contactNumber" placeholder="Contact Number">
                <input type="date" id="dateOfBirth" placeholder="Date of Birth">
                <select id="designation" required>
                    <option value="">Select Designation</option>
                    <option value="Administrator">Administrator</option>
                    <option value="Veterinary Officer">Veterinary Officer</option>
                    <option value="Health Officer">Health Officer</option>  
                </select>
            </form>
            <div class="button-container">
                <button id="backButton" type="back" onclick="window.location.href='../src/pvo-login.html'">Back</button>
                <button id="regButton" type="submit">Sign up</button>
            </div>
            <script type="module" src="../assets/js/cris-signup.js"></script>
            
        </div>
        </div>
       
    </main>
