<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel Registration - CRIS</title>
    <link rel="stylesheet" href="CRIS Signup.css">
    <link rel="icon" href="images/CRIS icon.jpg" type="image/x-icon">
    <script src="CRIS Menu.js"></script>

</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <img src="images/CRIS logo login.png" alt="CRIS logo" class="logo">
            <h1>Personnel Registration</h1>
            <button class="burger" onclick="openMenu()">☰ Menu</button>
        </div>
    </header>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <button class="close-btn" onclick="closeMenu()">✕</button>
        <nav>
            <a href="CRIS Homepage.html">Home</a>
            <a href="#">Admin Access Portal</a>
            <a href="CRIS Reports.html">Reports</a>
            <a href="About CRIS.html">About CRIS</a>
        </nav>
    </aside> 

    <!-- Main Content -->
    <main class="main">
        <h2>Personnel Registration</h2>

        <div class="login-box">
            <a href="index.html" class="logo-link">
                <img src="images/pvo-logo.png" alt="PVO logo" class="login-logo">
            </a>

            <div class="boxbox">
    <form id="personnelForm">
        <!-- Row 1: Last Name + First Name -->
        <div class="form-row">
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lastName" required placeholder="Enter Last Name">
            </div>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="firstName" required placeholder="Enter First Name">
            </div>
        </div>

        <!-- Row 2: Middle Name + Email -->
        <div class="form-row">
            <div class="form-group">
                <label>Middle Initial</label>
                <input type="text" name="middleName" placeholder="Optional">
              </div>
            <div class="form-group">
                <label>Suffix</label>
                <input type="text" name="suffix" placeholder="Optional">
            </div>
            </div>
             <div class="form-row">
                <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                </div>
                 <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="example@email.com">
            </div>
             </div>
             <div class="form-row">
                    <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter password">
                </div>
                    <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword" required placeholder="Confirm password">
                </div>

             </div>
           

        <!-- Row 3: Address (Full width) -->
        <div class="form-group full-width">
            <label>Address</label>
            <textarea name="address" rows="3" required placeholder="Enter full address"></textarea>
        </div>

        <!-- Row 4: Date of Birth + Designation -->
        <div class="form-row">
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>
            <div class="form-group">
                <label>Designation</label>
                <select name="designation" required>
                    <option value="">Select Designation</option>
                    <option value="administrator">Administrator</option>
                    <option value="veterinary">Veterinary Officer</option>
                </select>
            </div>
        </div>

        <!-- Buttons -->
        <div style="margin-top: 20px;">
            <button type="submit" class="button" style="float: right;">Submit</button>
            <a href="index.html" class="button" style="float: left;">Back</a>
            <div style="clear: both;"></div>
        </div>
    </form>
</div>

           
        </div>
    </main>     

    <!-- Footer -->
    <footer class="footer"></footer>


</body>
</html>
